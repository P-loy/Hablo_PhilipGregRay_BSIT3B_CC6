<!DOCTYPE HTML>
<HTML>
<HEAD>
     <Title>Javascript Operators</Title>
</HEAD>
<body>
     <script>
             // Addition: Displays 50
             var x = 30;
             y = 20;
             var z = x + y;
             document.write(z);

             // Subtraction: Display 10
             var x = 30;
             y = 20;
             var z = x - y;
             document.write("<br>" + z);

             // Multiplication: Display 600
             var x = 30;
             y = 20;
             var z = x * y;
             document.write("<br>" + z);

             // Division: Display 1.5
             var x = 30;
             y = 20;
             var z = x / y;
             document.write("<br>" + z);

             // Modulos: Display 10
             var x = 30;
             y = 20;
             var z = x % y;
             document.write("<br>" + z);

             // Add and Assign: Display 30
             var x = 20;
             x+=10;
             document.write("<br>" + x); 

             // Subtract and Assign: Display 10 
             var x = 20;
             x-=10;
             document.write("<br>" + x); 

             // Multiply and Assign: Display 200
             var x = 20;
             x*=10;
             document.write("<br>" + x); 

             // Divide and Assign: Display 2
             var x = 20;
             x/=10;
             document.write("<br>" + x); 

             // Modulos and Assogn: Display 0
             var x = 20;
             x%=10;
             document.write("<br>" + x); 
     </script>
</body>            
</html>
